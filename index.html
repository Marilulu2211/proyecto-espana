<!DOCTYPE html>
<html lang="es">
<head>

    <title>Proyecto España</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; text-align: center; }
        
        /* Contenedor del carrusel */
        .carrusel {
            display: flex;
            overflow-x: auto; /* Esto permite deslizar con el dedo o mouse */
            scroll-snap-type: x mandatory;
            gap: 10px;
            padding: 20px;
            background: #333;
        }
        
        .carrusel img {
            flex: 0 0 90%; /* Cada diapo ocupa el 90% del ancho */
            scroll-snap-align: center;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .instruccion { font-size: 14px; color: #666; padding: 10px; }

        /* Contenedor de la página del restaurante */
        .restaurante-frame {
            width: 95%;
            height: 600px;
            margin: 20px auto;
            border: 5px solid #27ae60;
            border-radius: 15px;
            overflow: hidden;
        }
    </style>
</head>
